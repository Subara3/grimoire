name: release

# タグ v* を push したときだけ動く。
# テストが全部通ったときのみ exe をビルドしてリリースに添付する（品質ゲート）。
on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Quality gate - run tests
        run: python -m unittest discover -s tests -p "test_*.py" -v

      - name: Install build deps
        run: python -m pip install --upgrade pyinstaller pillow

      - name: Build exe
        run: python -m PyInstaller --noconfirm --onefile --windowed --name "Grimoire" --icon "icon.ico" --add-data "icon.ico;." --add-data "ui_lock.png;." --add-data "ui_unlock.png;." --add-data "ui_gear.png;." --add-data "ui_edit.png;." --add-data "ui_delete.png;." --add-data "ui_search.png;." --add-data "ui_blank.png;." --add-data "ui_grip.png;." --add-data "ui_star.png;." --add-data "ui_star_off.png;." stamper.py

      - name: Attach exe to the release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Grimoire.exe
          fail_on_unmatched_files: true
